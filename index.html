<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="chatbot" aria-label="AI chatbot">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Project Demo</p>
          <h1>AI Chatbot</h1>
        </div>
        <div class="header-actions">
          <button class="ghost-button" id="clearChatButton" type="button">Clear</button>
          <span class="status">Online</span>
        </div>
      </header>

      <div class="notice" id="notice" hidden></div>

      <div class="chat-messages" id="chatMessages">
        <article class="message bot">
          <div class="avatar">AI</div>
          <p>Hello! I am your AI chatbot. Ask me anything.</p>
        </article>
      </div>

      <form class="chat-form" id="chatForm">
        <input
          id="messageInput"
          type="text"
          placeholder="Type your message..."
          autocomplete="off"
          required
        />
        <button id="sendButton" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
